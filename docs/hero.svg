<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
  </g>

  <!-- Glow circles -->
  <circle cx="250" cy="150" r="120" fill="url(#glow)" opacity="0.5"/>
  <circle cx="550" cy="150" r="100" fill="url(#glow)" opacity="0.3"/>

  <!-- Left side: Microphone / Podcast icon -->
  <g transform="translate(180, 80)">
    <!-- Microphone body -->
    <rect x="20" y="0" width="40" height="70" rx="20" stroke="url(#accent)" stroke-width="2.5" fill="none"/>
    <!-- Mic lines -->
    <line x1="30" y1="25" x2="50" y2="25" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="35" x2="50" y2="35" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="30" y1="45" x2="50" y2="45" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <!-- Mic stand arc -->
    <path d="M10,65 Q10,95 40,95 Q70,95 70,65" stroke="url(#accent)" stroke-width="2.5" fill="none"/>
    <!-- Mic stand -->
    <line x1="40" y1="95" x2="40" y2="120" stroke="url(#accent)" stroke-width="2.5"/>
    <line x1="25" y1="120" x2="55" y2="120" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Sound waves from mic -->
  <g transform="translate(270, 110)" opacity="0.4">
    <path d="M0,0 Q15,-20 0,-40" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
    <path d="M8,5 Q28,-22 8,-50" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
    <path d="M16,10 Q41,-24 16,-60" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Center: Arrow / Flow -->
  <g transform="translate(330, 135)">
    <line x1="0" y1="15" x2="80" y2="15" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="85,15 75,8 75,22" fill="#06b6d4"/>
    <!-- AI sparkle above arrow -->
    <g transform="translate(40, -5)" opacity="0.7">
      <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#8b5cf6"/>
    </g>
    <text x="40" y="42" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">AI</text>
  </g>

  <!-- Right side: Document / Article icon -->
  <g transform="translate(460, 85)">
    <!-- Document outline -->
    <rect x="0" y="0" width="65" height="85" rx="6" stroke="url(#accent)" stroke-width="2.5" fill="none"/>
    <!-- Folded corner -->
    <path d="M45,0 L65,20" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Text lines -->
    <line x1="12" y1="30" x2="53" y2="30" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="12" y1="42" x2="45" y2="42" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="12" y1="54" x2="50" y2="54" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="12" y1="66" x2="38" y2="66" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="400" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.5">
    Podcast Blog
  </text>

  <!-- Subtitle -->
  <text x="400" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    YouTube podcasts → AI-generated articles
  </text>
</svg>
